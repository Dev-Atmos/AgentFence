name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test
        working-directory: agentfence
        run: npm test

      - name: Scan vulnerable fixture
        working-directory: agentfence
        run: node ./bin/agentfence.js scan --path ./fixtures/vulnerable --json ./agentfence-report.json --out ./agentfence-report.html
